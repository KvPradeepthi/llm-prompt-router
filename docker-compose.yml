version: '3.9'

services:
  llm-router:
    build: .
    container_name: llm-prompt-router
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./route_log.jsonl:/app/route_log.jsonl
      - ./.env:/app/.env
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
